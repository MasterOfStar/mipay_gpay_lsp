name: Build & Release

on:
  push:
    branches: [master, test1, YukihookD]
    tags:
      - "v*"
  pull_request:
    branches: [master, test1, YukihookD]

env:
  JAVA_VERSION: "17"
  XPOSED_API_URL: "https://maven.aliyun.com/repository/public/de/robv/android/xposed/api/82/api-82.jar"
  KEYSTORE_PASS: "mipay1234"
  KEYSTORE_ALIAS: "mipaygpay"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle files
        uses: gradle/wrapper-validation-action@v2

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Download Xposed API JAR
        run: |
          mkdir -p app/libs
          curl -fsSL "${{ env.XPOSED_API_URL }}" -o app/libs/xposed-api.jar
          echo "Downloaded: $(wc -c < app/libs/xposed-api.jar) bytes"
          unzip -t app/libs/xposed-api.jar > /dev/null 2>&1 && echo "JAR valid" || { echo "JAR invalid"; exit 1; }

      - name: Create keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p app/keystore
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/mipay.jks
            echo "Keystore size: $(wc -c < app/keystore/mipay.jks) bytes"
          else
            echo "No keystore secret, will build debug APK"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK
        run: |
          if [ -f "app/keystore/mipay.jks" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi
        timeout-minutes: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mipay-gpay-lsp-${{ github.run_number }}
          path: app/build/outputs/apk/**/*.apk
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: MiPay GPay LSP ${{ github.ref_name }}
          body: |
            ## MiPay GPay LSPosed 模块 ${{ github.ref_name }}

            ### 更新内容
            详见 [Commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})

            ### 安装说明
            1. 下载下方 `app-release.apk`
            2. 在 LSPosed Manager 中启用模块
            3. 勾选作用域：`小米智能卡`（`com.miui.tsmclient`）和 `Google Wallet`（`com.google.android.apps.walletnfcrel`）
            4. 强制停止并重启小米智能卡

            ### 系统要求
            - LSPosed 框架
            - Android 12+ (API 30+)
            - 已安装 Google Wallet

            ### 校验信息
            - **构建时间**: ${{ github.event.head_commit.timestamp }}
            - **提交**: ${{ github.sha }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify WeChat Success
        if: ${{ success() && env.WECHAT_WEBHOOK_URL != '' }}
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$WECHAT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"✅ **MiPay GPay LSP 构建成功**\n> 版本: \`${{ github.ref_name }}\`\n> 提交: \`${{ github.sha }}\`\n\n📦 [下载 APK](https://github.com/${{ github.repository }}/releases)\"}}" || true

      - name: Notify WeChat Failure
        if: ${{ failure() && env.WECHAT_WEBHOOK_URL != '' }}
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$WECHAT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"❌ **MiPay GPay LSP 构建失败**\n> 提交: \`${{ github.sha }}\`\"}}" || true
